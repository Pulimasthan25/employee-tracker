<div class="app-select" [class.is-open]="isOpen()" [id]="id">
  @if (label) {
  <label [for]="id + '-trigger'" class="app-select__label">{{ label }}</label>
  }

  <div class="app-select__container">
    <button type="button" class="app-select__trigger" [id]="id + '-trigger'" (click)="toggleDropdown()"
      [attr.aria-expanded]="isOpen()" aria-haspopup="listbox">
      <div class="app-select__selected-content">
        @if (selectedOption(); as opt) {
        <span class="app-select__value">{{ opt.label }}</span>
        } @else {
        <span class="app-select__placeholder">{{ placeholder }}</span>
        }
      </div>

      <div class="app-select__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </button>

    @if (isOpen()) {
    <div class="app-select__dropdown glass" @expandVertical role="listbox">
      <ul class="app-select__options">
        @for (option of options; track option.value) {
        <li class="app-select__option" [class.is-selected]="option.value === selectedValue()"
          (click)="selectOption(option)" role="option" [attr.aria-selected]="option.value === selectedValue()">
          <div class="app-select__option-content">
            <span class="app-select__option-label">{{ option.label }}</span>
          </div>
        </li>
        }
      </ul>
    </div>
    }
  </div>
</div>
