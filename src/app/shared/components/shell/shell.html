<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <span class="shell__logo"></span>
      <span class="shell__name">PulseTrack</span>
    </div>
    <nav class="shell__nav">
      @for (item of visibleNav(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="shell__nav-item--active"
          [routerLinkActiveOptions]="{ exact: item.path !== '/employees' && item.path !== '/reports' }"
          class="shell__nav-item"
        >
          @switch (item.icon) {
            @case ('grid') {
              <svg class="shell__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
            }
            @case ('users') {
              <svg class="shell__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            }
            @case ('camera') {
              <svg class="shell__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            }
            @case ('chart') {
              <svg class="shell__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
              </svg>
            }
            @default {
              <span class="shell__icon shell__icon--placeholder"></span>
            }
          }
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="shell__user">
      <div class="shell__avatar">{{ avatarLetter() }}</div>
      <div class="shell__user-info">
        <span class="shell__user-name">{{ displayName() }}</span>
        <span class="shell__user-email">{{ userEmail() }}</span>
      </div>
      <button type="button" class="btn btn--ghost shell__logout" (click)="logout()">
        Log out
      </button>
    </div>
  </aside>
  <div class="shell__main-wrap">
    <header class="shell__topbar">
      <h1 class="shell__title">{{ pageTitle() }}</h1>
      <div class="shell__topbar-right">
        <span class="badge">Live</span>
        <span class="shell__topbar-email">{{ userEmail() }}</span>
      </div>
    </header>
    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</div>
