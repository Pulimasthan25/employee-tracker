<div class="shell" [class.shell--menu-open]="isMenuOpen()">
  
  <!-- THE TOP RAIL -->
  <header class="shell__top-rail">
    
    <!-- Left: Brand (Glass Pill) -->
    <div class="shell__brand glass">
      <!-- Inline SVG avoids PWA standalone PNG transparency/color issues -->
      <div class="shell__brand-icon" aria-label="Pulse Logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L4.5 13.5H11L9.5 22L19.5 10H13L13 2Z" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="shell__brand-text">Pulse</span>
    </div>

    <!-- Center: Navigation Pill (Glass) -->
    <div class="shell__satellite glass">
      <nav class="shell__sat-section shell__sat-section--nav">
        <div class="shell__sat-track">
          @for (item of visibleNav(); track item.path) {
            <a
              [routerLink]="item.path"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: item.path !== '/settings' && item.path !== '/reports' }"
              class="shell__sat-tab"
              [title]="item.label"
            >
              <div class="shell__sat-icon">
                @switch (item.icon) {
                  @case ('grid') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
                      <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                  }
                  @case ('users') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    </svg>
                  }
                  @case ('camera') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                      <circle cx="12" cy="13" r="4"/>
                    </svg>
                  }
                  @case ('chart') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <line x1="18" y1="10" x2="18" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="6" y1="14" x2="6" y2="20"/>
                    </svg>
                  }
                  @case ('settings') {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M12.22 2h-0.44a2 2 0 0 0-2 2v0.18a2 2 0 0 1-1 1.73l-0.43 0.25a2 2 0 0 1-2 0l-0.15-0.08a2 2 0 0 0-2.73 0.73l-0.22 0.38a2 2 0 0 0 0.73 2.73l0.15 0.1a2 2 0 0 1 1 1.72v0.51a2 2 0 0 1-1 1.74l-0.15 0.09a2 2 0 0 0-0.73 2.73l0.22 0.38a2 2 0 0 0 2.73 0.73l-0.15-0.08a2 2 0 0 1 2 0l0.43 0.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h0.44a2 2 0 0 0 2-2v-0.18a2 2 0 0 1 1-1.73l0.43-0.25a2 2 0 0 1 2 0l0.15 0.08a2 2 0 0 0 2.73-0.73l0.22-0.38a2 2 0 0 0-0.73-2.73l-0.15-0.1a2 2 0 0 1-1-1.72v-0.51a2 2 0 0 1 1-1.74l0.15-0.09a2 2 0 0 0 0.73-2.73l-0.22-0.38a2 2 0 0 0-2.73-0.73l-0.15 0.08a2 2 0 0 1-2 0l-0.43-0.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                  }
                }
              </div>
              <span class="shell__sat-label">{{ item.label }}</span>
            </a>
          }
        </div>
      </nav>
    </div>

    <!-- Right: User Menu -->
    <div class="shell__user-menu group">
      <button class="shell__user-trigger glass">
        <span class="shell__user-name-label">{{ displayName() }}</span>
        <div class="shell__sat-avatar">{{ avatarLetter() }}</div>
        <svg class="shell__user-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <div class="shell__dropdown glass">
        <div class="shell__dropdown-header">
          <div class="shell__dropdown-name">{{ displayName() }}</div>
          <div class="shell__dropdown-email">{{ userEmail() }}</div>
        </div>
        <div class="shell__dropdown-divider"></div>
        <button class="shell__dropdown-action" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Sign out</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Context Title -->
  <header class="shell__context-header">
    <div class="shell__context-pulse"></div>
    <h1 class="shell__context-title">{{ pageTitle() }}</h1>
  </header>

  <main class="shell__viewport-pulse" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet" />
  </main>

  <app-confirm-dialog />
</div>
