<div class="date-range">
  <div class="date-range__tabs">
    <button type="button" class="date-range__tab" [class.is-active]="selectedRange() === 'today'" (click)="setRange('today')">Today</button>
    <button type="button" class="date-range__tab" [class.is-active]="selectedRange() === '7d'" (click)="setRange('7d')">7 days</button>
    <button type="button" class="date-range__tab" [class.is-active]="selectedRange() === '30d'" (click)="setRange('30d')">30 days</button>
    <button type="button" class="date-range__tab" [class.is-active]="selectedRange() === 'custom'" (click)="setRange('custom')">Custom</button>
  </div>
  
  @if (selectedRange() === 'custom') {
    <div class="date-range__custom-wrap">
      <input type="date" class="date-range__date-input" [formControl]="fromControl" />
      <span class="date-range__sep">to</span>
      <input type="date" class="date-range__date-input" [formControl]="toControl" />
    </div>
  }
</div>
