<div class="timeline">
  <div class="timeline__header">
    <div class="timeline__user-col">Employee</div>
    <div class="timeline__chart-col">
      <div class="timeline__grid-labels">
        @for (h of hours; track h) {
          <div class="timeline__hour-label">{{ formatHour(h) }}</div>
        }
      </div>
    </div>
  </div>

  <div class="timeline__body">
    @for (row of rows; track row.userId) {
      <div class="timeline__row">
        <div class="timeline__user-col">
          <div class="timeline__user-info">
            <div class="timeline__avatar">{{ row.userName.charAt(0).toUpperCase() }}</div>
            <span class="timeline__name">{{ row.userName }}</span>
          </div>
        </div>
        <div class="timeline__chart-col">
          <div class="timeline__track-wrap">
            <div class="timeline__grid">
              @for (h of hours; track h) {
                <div class="timeline__grid-line"></div>
              }
            </div>
            <div class="timeline__track">
              @for (seg of row.segments; track $index) {
                <div class="timeline__segment" 
                     [class]="'timeline__segment--' + seg.type"
                     [style.left.%]="(seg.startMinutes / (24 * 60)) * 100"
                     [style.width.%]="((seg.endMinutes - seg.startMinutes) / (24 * 60)) * 100"
                     [attr.title]="(seg.appName || seg.type) + ' (' + seg.type + ')'">
                </div>
              }
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="timeline__legend">
    <div class="timeline__legend-item">
      <span class="timeline__dot timeline__dot--productive"></span>
      <span>Productive</span>
    </div>
    <div class="timeline__legend-item">
      <span class="timeline__dot timeline__dot--unproductive"></span>
      <span>Unproductive</span>
    </div>
    <div class="timeline__legend-item">
      <span class="timeline__dot timeline__dot--neutral"></span>
      <span>Neutral</span>
    </div>
    <div class="timeline__legend-item">
      <span class="timeline__dot timeline__dot--break"></span>
      <span>Break</span>
    </div>
  </div>
</div>
