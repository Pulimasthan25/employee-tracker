<div class="settings-layout" @fadeIn>
  <div class="settings-layout__header">
    @if (showTabs()) {
    <nav class="settings-layout__tabs" @fadeIn>
      <a routerLink="/settings/employees" routerLinkActive="settings-layout__tab--active" class="settings-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"
          style="margin-right: 8px;">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Employees
      </a>
      <a routerLink="/settings/productivity" routerLinkActive="settings-layout__tab--active"
        class="settings-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"
          style="margin-right: 8px;">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        Rules
      </a>
      <a routerLink="/settings/agents" routerLinkActive="settings-layout__tab--active" class="settings-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"
          style="margin-right: 8px;">
          <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
          <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
          <line x1="6" y1="6" x2="6.01" y2="6"></line>
          <line x1="6" y1="18" x2="6.01" y2="18"></line>
        </svg>
        Agents
      </a>
    </nav>

    <div class="settings-layout__actions" @fadeIn>
      @if (primaryAction(); as action) {
      @if (action.routerLink) {
      <a [routerLink]="action.routerLink" class="btn" [ngClass]="action.btnClass || 'btn--primary'">
        @if (action.icon === 'plus') {
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
          style="margin-right: 6px;">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        }
        {{ action.label }}
      </a>
      } @else {
      <button class="btn" [ngClass]="action.btnClass || 'btn--primary'" (click)="executeAction()">
        @if (action.icon === 'plus') {
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
          style="margin-right: 6px;">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        }
        {{ action.label }}
      </button>
      }
      }
    </div>
    }
  </div>

  <div class="settings-layout__content">
    <router-outlet />
  </div>
</div>
