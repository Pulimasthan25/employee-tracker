<div class="reports-layout" @fadeIn>
  <div class="reports-layout__header">
    <nav class="reports-layout__tabs" @staggerFadeIn>
      <a routerLink="/reports/dashboard" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Dashboard
      </a>
      <a routerLink="/reports/productivity" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        Productivity
      </a>
      <a routerLink="/reports/apps" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        App usage
      </a>
      <a routerLink="/reports/urls" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        URL usage
      </a>
      <a routerLink="/reports/attendance" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Attendance
      </a>
    </nav>
  </div>
  <div class="reports-layout__content">
    <router-outlet />
  </div>
</div>
