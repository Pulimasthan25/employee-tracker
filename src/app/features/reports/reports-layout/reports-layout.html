<div class="reports-layout" @fadeIn>
  <div class="reports-layout__header">
    <nav class="reports-layout__tabs" @staggerFadeIn>
      <button type="button" routerLink="/reports/dashboard" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Dashboard
      </button>
      <button type="button" routerLink="/reports/productivity" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        Productivity
      </button>
      <button type="button" routerLink="/reports/attendance" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="margin-right: 8px;">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Attendance
      </button>
    </nav>
  </div>
  <div class="reports-layout__content">
    <router-outlet />
  </div>
</div>
