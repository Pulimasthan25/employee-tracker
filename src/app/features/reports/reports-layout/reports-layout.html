<div class="reports-layout" @fadeIn>
  <div class="reports-layout__tabs" @staggerFadeIn>
    <a routerLink="/reports/timeline" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">Timeline</a>
    <a routerLink="/reports/productivity" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">Productivity</a>
    <a routerLink="/reports/apps" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">App usage</a>
    <a routerLink="/reports/urls" routerLinkActive="reports-layout__tab--active" class="reports-layout__tab">URL usage</a>
    <a routerLink="/reports/attendance"
       routerLinkActive="reports-layout__tab--active"
       class="reports-layout__tab">Attendance</a>
  </div>
  <div class="reports-layout__content">
    <router-outlet />
  </div>
</div>
